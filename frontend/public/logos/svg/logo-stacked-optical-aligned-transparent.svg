<svg width="640" height="560" viewBox="0 0 640 560" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="g" x1="100" y1="80" x2="600" y2="80" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#1D4ED8"/>
    <stop offset="52%" stop-color="#2563EB"/>
    <stop offset="100%" stop-color="#2EC4B6"/>
  </linearGradient>
  <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.12 0 0 0 0 0.39 0 0 0 0 0.92 0 0 0 .24 0"/>
    <feMerge>
      <feMergeNode/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<g transform="translate(100,80)" filter="url(#logoGlow)">
  <g stroke="url(#g)" stroke-width="16" fill="none">
    <rect x="0" y="0" width="140" height="220" rx="28"/>
    <rect x="180" y="0" width="140" height="220" rx="28"/>
    <rect x="360" y="0" width="140" height="220" rx="28"/>
  </g>
  <g fill="url(#g)">
    <rect x="46" y="44" width="48" height="44" rx="8"/>
    <rect x="46" y="132" width="48" height="44" rx="8"/>
    <rect x="232" y="58" width="36" height="104" rx="12"/>
    <rect x="412" y="58" width="36" height="104" rx="12"/>
  </g>
</g>

<text x="312" y="380" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="60" font-weight="500" letter-spacing="20" fill="#FFFFFF">HOME LOAN</text>
<text x="312" y="430" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="500" letter-spacing="8" fill="#94A3B8">YOUR SMARTEST WAY HOME</text>
</svg>